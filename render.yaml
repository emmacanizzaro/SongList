services:
  - type: web
    name: songlist-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build --workspace=@songlist/api
    startCommand: npm run start --workspace=@songlist/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://songlist-web.vercel.app
      # Completar manualmente en Render Dashboard:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      # Opcionales (solo si activás pagos con Stripe):
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
