name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  quality:
    name: Lint, Test, Typecheck and Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/songlist?schema=public

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Typecheck API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Typecheck Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: Build
        run: npm run build
